{% extends 'base.html' %}
{% block title %}Recuperar Senha - Vitória Uardon CRM{% endblock %}
{% block content %}
<div class="login-shell">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-eyebrow">Recuperação</div>
      <h1>Esqueci minha senha</h1>
      <p>Informe seu e-mail para receber o link de redefinição.</p>
    </div>
    <form method="post" class="login-form">
      <div class="login-field">
        <label class="form-label">E-mail</label>
        <input class="form-input" name="email" type="email" required autofocus>
      </div>
      <button class="btn btn-primary full login-submit" type="submit">Enviar link</button>
    </form>
    <div class="stack-sm" style="margin-top:10px; text-align:center;">
      <a class="mini-link" href="{{ url_for('login') }}">Voltar para login</a>
    </div>
  </div>
</div>
{% endblock %}
