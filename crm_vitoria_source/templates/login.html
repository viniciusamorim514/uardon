{% extends 'base.html' %}
{% block title %}Login - Uardon CRM{% endblock %}
{% block content %}
<div class="login-shell">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-mark-wrap" aria-label="Chave Uardon">
        <svg class="login-key-logo" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
          <circle cx="16" cy="16" r="11.5" stroke="#E9DFCC" stroke-width="1.8" fill="none"/>
          <path d="M16 8.5 L18.5 14 L24 16 L18.5 18 L16 23.5 L13.5 18 L8 16 L13.5 14 Z" fill="#E9DFCC"/>
          <line x1="26.5" y1="16" x2="42" y2="16" stroke="#E9DFCC" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="31" cy="16" r="1.6" fill="#E9DFCC"/>
          <circle cx="37" cy="16" r="1.2" fill="#E9DFCC"/>
          <line x1="38" y1="16" x2="38" y2="21" stroke="#E9DFCC" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="40.5" y1="16" x2="40.5" y2="19.5" stroke="#E9DFCC" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="43" y1="16" x2="43" y2="22" stroke="#E9DFCC" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="login-eyebrow">Acesso interno</div>
      <h1>Uardon</h1>
      <p>CRM de arquitetura para clientes, projetos e rotina do escritório.</p>
    </div>
    <form method="post" class="login-form">
      <div class="login-field">
        <label class="form-label">E-mail ou usuário</label>
        <input class="form-input" name="username" placeholder="login" required autofocus>
      </div>
      <div class="login-field">
        <label class="form-label">Senha</label>
        <input class="form-input" name="password" type="password" placeholder="Digite sua senha" required>
      </div>
      <button class="btn btn-primary full login-submit" type="submit">Entrar</button>
    </form>
    <div class="stack-sm login-links" style="margin-top:10px; text-align:center;">
      <a class="mini-link" href="{{ url_for('forgot_password') }}">Esqueci minha senha</a>
      <span class="login-links-sep"> / </span>
      <a class="mini-link" href="{{ url_for('signup') }}">Criar conta</a>
    </div>
  </div>
</div>
{% endblock %}
