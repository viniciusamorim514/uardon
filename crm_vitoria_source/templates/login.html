{% extends 'base.html' %}
{% block title %}Login - Uardon CRM{% endblock %}
{% block content %}
<div class="login-shell">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-mark-wrap" aria-label="Chave Uardon">
        <img class="login-key-logo" src="https://uardon.com.br/assets/generated/asset-002-bea613bdb145.png?v=brandkey3" alt="Chave Uardon">
      </div>
      <div class="login-eyebrow">Acesso interno</div>
      <h1>Uardon</h1>
      <p>CRM de arquitetura para clientes, projetos e rotina do escritório.</p>
    </div>
    <form method="post" class="login-form">
      <div class="login-field">
        <label class="form-label">E-mail ou usuário</label>
        <input class="form-input" name="username" placeholder="login" required autofocus>
      </div>
      <div class="login-field">
        <label class="form-label">Senha</label>
        <input class="form-input" name="password" type="password" placeholder="Digite sua senha" required>
      </div>
      <button class="btn btn-primary full login-submit" type="submit">Entrar</button>
    </form>
    <div class="stack-sm login-links" style="margin-top:10px; text-align:center;">
      <a class="mini-link" href="{{ url_for('forgot_password') }}">Esqueci minha senha</a>
      <span class="login-links-sep"> / </span>
      <a class="mini-link" href="{{ url_for('signup') }}">Criar conta</a>
    </div>
  </div>
</div>
{% endblock %}
