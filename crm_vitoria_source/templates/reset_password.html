{% extends 'base.html' %}
{% block title %}Nova Senha - Vitória Uardon CRM{% endblock %}
{% block content %}
<div class="login-shell">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-eyebrow">Recuperação</div>
      <h1>Definir nova senha</h1>
    </div>
    <form method="post" class="login-form">
      <div class="login-field">
        <label class="form-label">Nova senha</label>
        <input class="form-input" name="password" type="password" minlength="8" required autofocus>
      </div>
      <div class="login-field">
        <label class="form-label">Confirmar nova senha</label>
        <input class="form-input" name="password_confirm" type="password" minlength="8" required>
      </div>
      <button class="btn btn-primary full login-submit" type="submit">Atualizar senha</button>
    </form>
    <div class="stack-sm" style="margin-top:10px; text-align:center;">
      <a class="mini-link" href="{{ url_for('login') }}">Voltar para login</a>
    </div>
  </div>
</div>
{% endblock %}
